name: Build Android APK

on:
  push:
    branches:
      - main
    paths-ignore:
      - version.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-main
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "21"
  APP_VERSION_NAME: 1.0.${{ github.run_number }}
  APP_VERSION_CODE: ${{ github.run_number }}
  RELEASE_TAG: v1.0.${{ github.run_number }}
  RELEASE_APK_NAME: qualcoco.apk
  RELEASE_APK_URL: https://github.com/${{ github.repository }}/releases/download/v1.0.${{ github.run_number }}/qualcoco.apk
  REQUIRED_UPDATE: ${{ vars.APP_UPDATE_REQUIRED || 'false' }}

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate Android signing secrets
        run: |
          missing=0
          for secret_name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing required GitHub secret: ${secret_name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Configure Android local.properties
        run: |
          if [ -n "${ANDROID_SDK_ROOT:-}" ]; then
            echo "sdk.dir=${ANDROID_SDK_ROOT}" > android/local.properties
          elif [ -n "${ANDROID_HOME:-}" ]; then
            echo "sdk.dir=${ANDROID_HOME}" > android/local.properties
          else
            echo "::error::ANDROID_SDK_ROOT/ANDROID_HOME not configured on runner"
            exit 1
          fi

      - name: Copy web assets into Android project
        run: |
          # CI copies the already built web bundle directly into the versioned Android shell.
          rm -rf android/app/src/main/assets/public
          mkdir -p android/app/src/main/assets/public
          cp -R dist/. android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json

      - name: Prepare Android keystore
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Validate decoded keystore
        run: |
          keytool -list \
            -keystore android/app/release.keystore \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" > /dev/null
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Validate private key password
        run: |
          mkdir -p /tmp/keystore-check
          echo "qualcoco" > /tmp/keystore-check/check.txt
          jar --create --file /tmp/keystore-check/check.jar -C /tmp/keystore-check check.txt
          jarsigner \
            -keystore android/app/release.keystore \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            /tmp/keystore-check/check.jar \
            "$ANDROID_KEY_ALIAS" > /dev/null
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build signed release APK
        id: gradle_release
        continue-on-error: true
        working-directory: android
        run: |
          set -o pipefail
          ./gradlew assembleRelease --stacktrace --info 2>&1 | tee ../build-release.log
        env:
          APP_VERSION_CODE: ${{ env.APP_VERSION_CODE }}
          APP_VERSION_NAME: ${{ env.APP_VERSION_NAME }}
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Print Gradle release diagnostics
        if: ${{ steps.gradle_release.outcome == 'failure' }}
        run: |
          echo "---- build-release.log (tail) ----"
          tail -n 200 build-release.log || true
          echo "---- filtered failure lines ----"
          grep -n -E "FAILURE:|What went wrong:|Execution failed for task|Caused by:|ERROR:" build-release.log | tail -n 80 || true
          exit 1

      - name: Copy release APK
        if: ${{ steps.gradle_release.outcome == 'success' }}
        run: cp android/app/build/outputs/apk/release/app-release.apk ${{ env.RELEASE_APK_NAME }}

      - name: Upload workflow artifact
        if: ${{ steps.gradle_release.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: ${{ env.RELEASE_APK_NAME }}
          if-no-files-found: error

      - name: Create GitHub release and upload APK
        if: ${{ steps.gradle_release.outcome == 'success' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: ${{ env.RELEASE_APK_NAME }}
          generate_release_notes: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version.json
        if: ${{ steps.gradle_release.outcome == 'success' }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');

          const required = String(process.env.REQUIRED_UPDATE || 'false')
            .trim()
            .toLowerCase() === 'true';

          const payload = {
            version: process.env.APP_VERSION_NAME,
            required,
            url: process.env.RELEASE_APK_URL,
          };

          fs.writeFileSync('version.json', `${JSON.stringify(payload, null, 2)}\n`);
          NODE

      - name: Commit updated version.json
        if: ${{ steps.gradle_release.outcome == 'success' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.json

          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git commit -m "chore: update version manifest to ${APP_VERSION_NAME} [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
