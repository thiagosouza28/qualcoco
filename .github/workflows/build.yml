name: Build Android APK

on:
  push:
    branches:
      - main
    paths-ignore:
      - version.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-main
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "21"
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  APP_VERSION_NAME: 1.0.${{ github.run_number }}
  APP_VERSION_CODE: ${{ github.run_number }}
  RELEASE_TAG: v1.0.${{ github.run_number }}
  RELEASE_APK_NAME: qualcoco.apk
  RELEASE_APK_URL: https://github.com/${{ github.repository }}/releases/download/v1.0.${{ github.run_number }}/qualcoco.apk
  DRIVE_APK_NAME: appqualcoco1.0.${{ github.run_number }}.apk

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GOOGLE_DRIVE_FOLDER_ID: ${{ vars.GOOGLE_DRIVE_FOLDER_ID || '1C0mtzoXTGKheEZIkDOEqjibvT4PZiI91' }}
      REQUIRED_UPDATE: ${{ vars.APP_UPDATE_REQUIRED || 'false' }}
      ANDROID_KEYSTORE_TYPE: ${{ vars.ANDROID_KEYSTORE_TYPE || 'PKCS12' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Validate Android signing secrets
        run: |
          missing=0
          for secret_name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing required GitHub secret: ${secret_name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Install dependencies
        run: npm ci

      - name: Prepare web environment
        run: |
          cat > .env.production <<EOF
          VITE_FIREBASE_API_KEY=${{ vars.VITE_FIREBASE_API_KEY || 'AIzaSyCLthfmV4QPCRQv0nBF0-7uzah7fI4G8f0' }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ vars.VITE_FIREBASE_AUTH_DOMAIN || 'qualcoco-96f38.firebaseapp.com' }}
          VITE_FIREBASE_PROJECT_ID=${{ vars.VITE_FIREBASE_PROJECT_ID || 'qualcoco-96f38' }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ vars.VITE_FIREBASE_STORAGE_BUCKET || 'qualcoco-96f38.firebasestorage.app' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID || '497251186279' }}
          VITE_FIREBASE_APP_ID=${{ vars.VITE_FIREBASE_APP_ID || '1:497251186279:web:cf6684740f3fe9305c86c2' }}
          VITE_APP_UPDATE_MANIFEST_URL=https://raw.githubusercontent.com/${{ github.repository }}/main/version.json
          EOF

      - name: Build web app
        run: npm run build

      - name: Configure Android local.properties
        run: |
          if [ -n "${ANDROID_SDK_ROOT:-}" ]; then
            echo "sdk.dir=${ANDROID_SDK_ROOT}" > android/local.properties
          elif [ -n "${ANDROID_HOME:-}" ]; then
            echo "sdk.dir=${ANDROID_HOME}" > android/local.properties
          else
            echo "::error::ANDROID_SDK_ROOT/ANDROID_HOME not configured on runner"
            exit 1
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Copy web assets into Android project
        run: |
          rm -rf android/app/src/main/assets/public
          mkdir -p android/app/src/main/assets/public
          cp -R dist/. android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json

      - name: Prepare Android keystore
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Validate decoded keystore
        run: |
          keytool -list \
            -keystore android/app/release.keystore \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" > /dev/null
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Validate private key password
        run: |
          mkdir -p /tmp/keystore-check
          echo "qualcoco" > /tmp/keystore-check/check.txt
          jar --create --file /tmp/keystore-check/check.jar -C /tmp/keystore-check check.txt
          jarsigner \
            -keystore android/app/release.keystore \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            /tmp/keystore-check/check.jar \
            "$ANDROID_KEY_ALIAS" > /dev/null
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build signed release APK
        shell: bash
        working-directory: android
        run: |
          set -o pipefail
          ./gradlew assembleRelease --stacktrace --info --max-workers 2 2>&1 | tee ../build-release.log
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "---- build-release.log (tail) ----"
            tail -n 200 ../build-release.log || true
            echo "---- filtered failure lines ----"
            grep -n -E "FAILURE:|What went wrong:|Execution failed for task|Caused by:|ERROR:" ../build-release.log | tail -n 80 || true
            exit "$status"
          fi
        env:
          APP_VERSION_CODE: ${{ env.APP_VERSION_CODE }}
          APP_VERSION_NAME: ${{ env.APP_VERSION_NAME }}
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.keystore
          ANDROID_KEYSTORE_TYPE: ${{ env.ANDROID_KEYSTORE_TYPE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          _JAVA_OPTIONS: -Xmx4096m

      - name: Copy release APK
        run: cp android/app/build/outputs/apk/release/app-release.apk ${{ env.RELEASE_APK_NAME }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: ${{ env.RELEASE_APK_NAME }}
          if-no-files-found: error

      - name: Create GitHub release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: ${{ env.RELEASE_APK_NAME }}
          generate_release_notes: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Assert Google Drive credentials
        shell: bash
        env:
          GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ env.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          if [ -z "${GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "::error::Missing required GitHub secret: GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON"
            exit 1
          fi
          if [ -z "${GOOGLE_DRIVE_FOLDER_ID:-}" ]; then
            echo "::error::Missing required Google Drive folder id (GOOGLE_DRIVE_FOLDER_ID)."
            exit 1
          fi

      - name: Upload APK to Google Drive
        id: google-drive-upload
        shell: bash
        env:
          GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_ID: ${{ env.GOOGLE_DRIVE_FOLDER_ID }}
          DRIVE_APK_NAME: ${{ env.DRIVE_APK_NAME }}
          SOURCE_APK_PATH: ${{ env.RELEASE_APK_NAME }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const crypto = require('node:crypto');
          const https = require('node:https');

          const readJson = () => {
            try {
              return JSON.parse(String(process.env.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON || '').trim());
            } catch {
              return null;
            }
          };

          const request = (url, method, headers, body) =>
            new Promise((resolve, reject) => {
              const req = https.request(
                url,
                { method, headers },
                (res) => {
                  let data = '';
                  res.on('data', (chunk) => (data += chunk));
                  res.on('end', () => resolve({ status: res.statusCode || 0, body: data }));
                },
              );
              req.on('error', reject);
              if (body) req.write(body);
              req.end();
            });

          const base64Url = (input) =>
            Buffer.from(input)
              .toString('base64')
              .replace(/=/g, '')
              .replace(/\+/g, '-')
              .replace(/\//g, '_');

          const signJwt = (payload, privateKey) => {
            const header = { alg: 'RS256', typ: 'JWT' };
            const encodedHeader = base64Url(JSON.stringify(header));
            const encodedPayload = base64Url(JSON.stringify(payload));
            const toSign = `${encodedHeader}.${encodedPayload}`;
            const signature = crypto
              .createSign('RSA-SHA256')
              .update(toSign)
              .sign(privateKey);
            return `${toSign}.${base64Url(signature)}`;
          };

          (async () => {
            const serviceAccount = readJson();
            const folderId = String(process.env.DRIVE_FOLDER_ID || '').trim();
            const fileName = String(process.env.DRIVE_APK_NAME || '').trim();
            const sourcePath = String(process.env.SOURCE_APK_PATH || '').trim();
            const githubEnv = String(process.env.GITHUB_ENV || '').trim();
            const githubOutput = String(process.env.GITHUB_OUTPUT || '').trim();

            if (!serviceAccount || !serviceAccount.client_email || !serviceAccount.private_key) {
              throw new Error('Google Drive service account JSON inválido.');
            }
            if (!folderId || !fileName || !sourcePath) {
              throw new Error('Parâmetros insuficientes para upload no Google Drive.');
            }

            const now = Math.floor(Date.now() / 1000);
            const jwt = signJwt(
              {
                iss: serviceAccount.client_email,
                scope: 'https://www.googleapis.com/auth/drive',
                aud: 'https://oauth2.googleapis.com/token',
                iat: now,
                exp: now + 3600,
              },
              serviceAccount.private_key,
            );

            const tokenResponse = await request(
              'https://oauth2.googleapis.com/token',
              'POST',
              { 'Content-Type': 'application/x-www-form-urlencoded' },
              `grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${encodeURIComponent(jwt)}`,
            );

            if (tokenResponse.status !== 200) {
              throw new Error(`Falha ao gerar access token: HTTP ${tokenResponse.status} ${tokenResponse.body}`);
            }

            const tokenPayload = JSON.parse(tokenResponse.body || '{}');
            const token = String(tokenPayload.access_token || '').trim();
            if (!token) {
              throw new Error('Access token vazio retornado pelo Google.');
            }

            const appendGithubLine = (targetPath, key, value) => {
              fs.appendFileSync(targetPath, `${key}=${String(value).replace(/\r?\n/g, '')}\n`);
            };

            const authHeaders = {
              Authorization: `Bearer ${token}`,
            };

            const driveQuery = `name = '${fileName.replace(/'/g, "\\'")}' and '${folderId}' in parents and trashed = false`;
            const searchResponse = await request(
              `https://www.googleapis.com/drive/v3/files?fields=files(id,name)&q=${encodeURIComponent(driveQuery)}`,
              'GET',
              authHeaders,
            );

            if (searchResponse.status !== 200) {
              throw new Error(`Falha ao pesquisar arquivo no Drive: HTTP ${searchResponse.status} ${searchResponse.body}`);
            }

            const searchPayload = JSON.parse(searchResponse.body || '{}');
            let driveFileId = Array.isArray(searchPayload.files) && searchPayload.files.length
              ? String(searchPayload.files[0].id || '').trim()
              : '';

            if (!driveFileId) {
              const boundary = `qualcoco-${Date.now()}`;
              const metadata = JSON.stringify({
                name: fileName,
                parents: [folderId],
              });
              const fileBytes = fs.readFileSync(sourcePath);
              const multipartBody = Buffer.concat([
                Buffer.from(
                  `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${metadata}\r\n`,
                ),
                Buffer.from(
                  `--${boundary}\r\nContent-Type: application/vnd.android.package-archive\r\n\r\n`,
                ),
                fileBytes,
                Buffer.from(`\r\n--${boundary}--\r\n`),
              ]);

              const uploadResponse = await request(
                'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name',
                'POST',
                {
                  ...authHeaders,
                  'Content-Type': `multipart/related; boundary=${boundary}`,
                },
                multipartBody,
              );

              if (uploadResponse.status !== 200) {
                throw new Error(
                  `Falha ao enviar APK para o Drive: HTTP ${uploadResponse.status} ${uploadResponse.body}`,
                );
              }

              const uploadPayload = JSON.parse(uploadResponse.body || '{}');
              driveFileId = String(uploadPayload.id || '').trim();
            }

            if (!driveFileId) {
              throw new Error('Google Drive não retornou o ID do arquivo publicado.');
            }

            const permissionResponse = await request(
              `https://www.googleapis.com/drive/v3/files/${driveFileId}/permissions`,
              'POST',
              {
                ...authHeaders,
                'Content-Type': 'application/json',
              },
              JSON.stringify({
                role: 'reader',
                type: 'anyone',
              }),
            );

            if (permissionResponse.status !== 200) {
              if (
                permissionResponse.status !== 409 &&
                !/already/i.test(permissionResponse.body || '')
              ) {
                throw new Error(
                  `Falha ao tornar o APK público no Drive: HTTP ${permissionResponse.status} ${permissionResponse.body}`,
                );
              }
            }

            const driveApkUrl = `https://drive.google.com/uc?export=download&id=${driveFileId}`;
            appendGithubLine(githubEnv, 'DRIVE_APK_URL', driveApkUrl);
            appendGithubLine(githubOutput, 'drive_apk_url', driveApkUrl);
            appendGithubLine(githubOutput, 'drive_file_id', driveFileId);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Generate version.json
        run: |
          node - <<'NODE'
          const fs = require('node:fs');

          const required = String(process.env.REQUIRED_UPDATE || 'false')
            .trim()
            .toLowerCase() === 'true';
          const driveUrl = String(process.env.DRIVE_APK_URL || '').trim();
          const githubUrl = String(process.env.RELEASE_APK_URL || '').trim();
          const urls = [driveUrl, githubUrl].filter(Boolean);

          const payload = {
            version: process.env.APP_VERSION_NAME,
            required,
            fileName: process.env.DRIVE_APK_NAME,
            url: urls[0] || githubUrl,
            urls,
            driveUrl: driveUrl || undefined,
            githubUrl,
          };

          fs.writeFileSync('version.json', `${JSON.stringify(payload, null, 2)}\n`);
          NODE

      - name: Commit updated version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.json

          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git commit -m "chore: update version manifest to ${APP_VERSION_NAME} [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
