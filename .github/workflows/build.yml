name: Build Android APK

on:
  push:
    branches:
      - main
    paths-ignore:
      - version.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-main
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "21"
  APP_VERSION_NAME: 1.0.${{ github.run_number }}
  APP_VERSION_CODE: ${{ github.run_number }}
  RELEASE_TAG: v1.${{ github.run_number }}
  RELEASE_APK_NAME: app.apk
  RELEASE_APK_URL: https://github.com/${{ github.repository }}/releases/download/v1.${{ github.run_number }}/app.apk
  REQUIRED_UPDATE: ${{ vars.APP_UPDATE_REQUIRED || 'false' }}

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate Android signing secrets
        run: |
          missing=0
          for secret_name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing required GitHub secret: ${secret_name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Prepare Android keystore
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build signed release APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease
        env:
          APP_VERSION_CODE: ${{ env.APP_VERSION_CODE }}
          APP_VERSION_NAME: ${{ env.APP_VERSION_NAME }}
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Copy release APK
        run: cp android/app/build/outputs/apk/release/app-release.apk ${{ env.RELEASE_APK_NAME }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: ${{ env.RELEASE_APK_NAME }}
          if-no-files-found: error

      - name: Create GitHub release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: ${{ env.RELEASE_APK_NAME }}
          generate_release_notes: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version.json
        run: |
          node - <<'NODE'
          const fs = require('node:fs');

          const required = String(process.env.REQUIRED_UPDATE || 'false')
            .trim()
            .toLowerCase() === 'true';

          const payload = {
            version: process.env.APP_VERSION_NAME,
            required,
            url: process.env.RELEASE_APK_URL,
          };

          fs.writeFileSync('version.json', `${JSON.stringify(payload, null, 2)}\n`);
          NODE

      - name: Commit updated version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.json

          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git commit -m "chore: update version manifest to ${APP_VERSION_NAME} [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
